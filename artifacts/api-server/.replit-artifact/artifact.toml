# Aurora FastAPI (Python) — production service.
# NOTE: This artifact lives under artifacts/api-server for historical Replit IDs,
# but the code + start.sh are ALWAYS under artifacts/aurora/ (source of truth).
# Do NOT move uvicorn to the Node @workspace/api-server package.
kind = "api"
previewPath = "/aurora"
title = "Aurora"
version = "1.1.1"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "Aurora"
paths = ["/aurora", "/docs", "/redoc", "/openapi.json"]

[services.development]
run = "cd /home/runner/workspace/artifacts/aurora && python -m uvicorn main:app --host 0.0.0.0 --port 8080 --reload"

[services.production]

[services.production.build]
args = ["pip", "install", "-r", "/home/runner/workspace/artifacts/aurora/requirements.txt"]

[services.production.run]
args = ["/home/runner/workspace/artifacts/aurora/start.sh"]

[services.production.run.env]
PORT = "8080"
PYTHONUNBUFFERED = "1"

[services.production.health.startup]
path = "/aurora/healthz"
