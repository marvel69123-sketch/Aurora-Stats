kind = "api"
previewPath = "/aurora"
title = "Aurora"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "Aurora"
paths = ["/aurora"]

[services.development]
run = "cd /home/runner/workspace/artifacts/aurora && uvicorn main:app --host 0.0.0.0 --port 8080 --reload"

[services.production]

[services.production.build]
args = ["pip", "install", "-r", "/home/runner/workspace/artifacts/aurora/requirements.txt"]

[services.production.run]
args = ["/home/runner/workspace/artifacts/aurora/start.sh"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/aurora/healthz"
