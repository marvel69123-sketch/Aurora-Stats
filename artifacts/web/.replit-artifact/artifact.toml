kind = "web"
previewPath = "/"
title = "Aurora"
version = "1.1.0"
id = "artifacts/web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22333

[services.development]
run = "pnpm --filter @workspace/web run dev"

[services.production]
# Force clean rebuild — never republish a stale artifacts/web/dist from a previous run
build = [ "node", "scripts/build-web-production.cjs" ]
publicDir = "artifacts/web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22333"
BASE_PATH = "/"
