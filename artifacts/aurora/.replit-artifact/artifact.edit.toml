# Aurora FastAPI — local edit metadata only.
# Production deploy is declared in:
#   artifacts/api-server/.replit-artifact/artifact.toml
# Code source of truth:
#   artifacts/aurora/
kind = "api"
previewPath = "/aurora"
title = "Aurora"
version = "1.0.0"

[[services]]
localPort = 8080
name = "Aurora"
paths = ["/aurora"]

[services.development]
run = "cd artifacts/aurora && uvicorn main:app --host 0.0.0.0 --port 8080 --reload"
