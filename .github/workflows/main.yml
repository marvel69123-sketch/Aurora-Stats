name: Aurora Auto CI

on:
  push:
    branches:
      - main

jobs:
  aurora-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install || true

      - name: Finished
        run: echo "Aurora synchronized successfully"
